services:
  mysqldb:
    container_name: DocMACCDentalClinic-MySQLDB
    image: mysql:8.3.0
    ports:
      - "3307:3306"
    environment:
      # MYSQL_USER: keycloak
      # MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: Qwerty.12345
      # MYSQL_DATABASE: docmaccdbdentaluser,docmaccdbtreatmentplan,docmaccdbbill,docmaccdbdentalchart,docmaccdbmedical,docmaccdbpatient
    volumes:
      - C:\Users\Admin\Downloads\docker-compose\dbinit\dbinit.sql:/docker-entrypoint-initdb.d/init.sql
      - C:\Users\Admin\Downloads\docker-compose\mysqlDB:/var/lib/mysql
      # - C:\Users\Kenneth\Documents\dumps1:/var/lib/mysql
    command:
      # - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # - --default-authentication-plugin=caching_sha2_password
      - --explicit_defaults_for_timestamp=1
      # - --lower-case-table-names=1
      - --max-connections=200
      # - --session-track-schema=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  keycloak:
    container_name: DocMACCDentalClinic-Keycloak
    ports:
      - "7080:8080"
    image: "quay.io/keycloak/keycloak:25.0.2"
    volumes:
      - C:\Users\Admin\Projects\DentalWebProject\Backend\k8s_MACC\customLogin:/opt/keycloak/themes
      # - C:/Users/Kenneth/Projects/DentalWeb/Backend/k8s_MACC/customLogin:/opt/keycloak/themes
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admindocmacc
      spi-theme-welcome-theme: C:\Users\Admin\Projects\DentalWebProject\Backend\k8s_MACC\customLogin
      # spi-theme-welcome-theme: C:/Users/Kenneth/Projects/DentalWeb/Backend/k8s_MACC/customLogin
      features: token-exchange
      KC_DB: mysql
      # KC_DB_URL: "jdbc:mysql://mysqldb:3306/docmaccdbdentaluser"
      # KC_DB_URL: "jdbc:mysql://mysqldb:3306/docmaccdbdentaluser?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci"
      # KC_DB_URL: "jdbc:mysql://mysqldb:3306/docmaccdbdentaluser?useInformationSchema=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      # KC_DB_URL: "jdbc:mysql://mysqldb:3306/docmaccdbdentaluser?useInformationSchema=true&nullCatalogMeansCurrent=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false"
      KC_DB_URL: "jdbc:mysql://mysqldb:3306/docmaccdbdentaluser?useInformationSchema=true&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true&useSSL=false"
      # KC_DB_URL: "jdbc:mysql://mysqldb:3306/docmaccdbdentaluser?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      # KC_HTTP_MANAGEMENT_PORT: 8080
      KC_DB_USERNAME: docmacc
      KC_DB_PASSWORD: d0cmAccpAssw0rd
      # KC_HOSTNAME: localhost
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep 'HTTP/1.1 200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["start-dev"]
    depends_on:
      mysqldb:
        condition: service_healthy
  kafka:
    image: "apache/kafka:4.0.0"
    container_name: DocMACCDentalClinic-Kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Listeners
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://host.docker.internal:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      keycloak:
        condition: service_healthy
volumes:
  data:
  logs:
