deploymentName: angular-ui-app
serviceLoadBalancerName: angular-ui-svc
appLabel: angular-ui

replicaCount: 1

image:
  repository: docmacc/angular-ui
  tag: 0.0.1
imagePullPolicy: Always

containerPort: 4200

service:
  type: LoadBalancer
  targetPort: 4200
  loadBalancer:
    port: 4200

