deploymentName: prerequisites-app
serviceName: prerequisites-svc
appLabel: prerequisites
dbHost: "host.docker.internal"
dbPort: 3307
networkHost: "192.168.1.2"
profileActive: "desktop-kub-prod"
applicationName: "PreRequisiteService"
fileDataLocation: /storage/mount/path/data/Prerequisite

replicaCount: 1

image:
  repository: kenmac17/prerequisite
  tag: v1.0.0
imagePullPolicy: Always

containerPort: 8086

service:
  port: 80
  targetPort: 8086

volumeMounts:
  mountPath: /storage/mount/path/data

volumeName: persistent-volume-prerequisite
typeLabel: local
storageClassName: hostpath
capacity:
  storage: 150Gi
accessModes: ReadWriteMany
# Use Docker Desktop specific path formats for 2026
# Windows example: /run/desktop/mnt/host/c/data
# macOS example: /Users/yourname/data
hostPath: /run/desktop/mnt/host/c/storageMACC
reclaimPolicy: Retain

volumeClaimName: persistent-volume-prerequisite-claim
requests:
  storage: 150Gi

environment_enabled: true
configserver_enabled: true
eurekaserver_enabled: true
dbhost_enabled: true
dbport_enabled: true
networkhost_enabled: true
filedatalocation_enabled: true
profile_enabled: true
service_name_enabled: true
volumemounts_enabled: true
volumes_enabled: true
