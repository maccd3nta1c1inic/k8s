deploymentName: medical-history-app
serviceName: medical-history-svc
appLabel: medical-history
dbHost: "host.docker.internal"
dbPort: 3307
profileActive: "desktop-kub-prod"
applicationName: "MedicalHistoryService"

replicaCount: 1

image:
  repository: kenmac17/medicalhistory
  tag: v1.0.0
imagePullPolicy: Always

containerPort: 8008

service:
  type: ClusterIP
  port: 80
  targetPort: 8008

environment_enabled: true
configserver_enabled: true
eurekaserver_enabled: true
dbhost_enabled: true
dbport_enabled: true
networkhost_enabled: false
filedatalocation_enabled: false
profile_enabled: true
service_name_enabled: true
volumemounts_enabled: false
volumes_enabled: false
